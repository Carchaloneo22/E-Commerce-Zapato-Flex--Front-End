<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZapatoFlex — Plan de Escalabilidad</title>
<style>
  :root {
    --bg: #0f2744;
    --bg-deep: #091b33;
    --surface: #1a3a5c;
    --surface-light: #234b72;
    --primary: #2563eb;
    --accent: #60a5fa;
    --highlight: #f0c040;
    --text: #e8f0fe;
    --text-muted: #8ab4d8;
    --border: #1e4670;
    --success: #34d399;
    --danger: #f87171;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────── */
  .header {
    background: var(--bg);
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 8px; flex-shrink: 0;
  }
  .header h1 { font-size: 18px; color: var(--white); font-weight: 800; }
  .header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ── TABS ────────────────────────────── */
  .tabs {
    display: flex; gap: 4px; padding: 12px 16px;
    overflow-x: auto; background: var(--bg);
    border-bottom: 1px solid var(--border);
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { height: 0; }
  .tab {
    padding: 8px 14px; border-radius: 8px; font-size: 11px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: all 0.25s ease; background: var(--surface);
    color: var(--text-muted); border: none; outline: none;
  }
  .tab:hover { background: var(--surface-light); }
  .tab.active { background: var(--primary); color: var(--white); }

  /* ── CONTENT LAYOUT ─────────────────── */
  .content { padding: 20px; max-width: 920px; margin: 0 auto; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 24px; align-items: start;
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* ── PREVIEW CONTAINER ──────────────── */
  .preview-label {
    font-size: 10px; color: var(--accent); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .preview-frame {
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    border: 1px solid var(--border);
  }

  /* ── DETAILS PANEL ──────────────────── */
  .detail-title { font-size: 22px; font-weight: 800; color: var(--white); line-height: 1.2; }
  .detail-subtitle { font-size: 13px; color: var(--accent); font-weight: 600; margin-top: 4px; }
  .detail-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin: 12px 0; }
  .detail-label { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 8px; }

  .improvement {
    display: flex; align-items: flex-start; gap: 8px;
    background: var(--surface); padding: 8px 12px;
    border-radius: 8px; border: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .improvement-num {
    width: 20px; height: 20px; border-radius: 6px;
    background: rgba(37,99,235,0.2); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .improvement span { font-size: 11px; color: var(--text); line-height: 1.4; }

  /* ── ROADMAP ────────────────────────── */
  .roadmap {
    margin-top: 32px; background: var(--bg); border-radius: 16px;
    padding: 20px; border: 1px solid var(--border);
  }
  .roadmap h2 { font-size: 16px; font-weight: 800; color: var(--white); margin-bottom: 16px; }
  .roadmap-grid { display: flex; gap: 8px; }
  @media (max-width: 600px) {
    .roadmap-grid { flex-direction: column; }
  }
  .phase { flex: 1; }
  .phase-bar { height: 4px; border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
  .phase-bar-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 0.6s ease; }
  .phase-month { font-size: 8px; font-weight: 700; margin-bottom: 2px; }
  .phase-title { font-size: 10px; font-weight: 700; color: var(--white); }
  .phase-desc { font-size: 8px; color: var(--text-muted); line-height: 1.4; margin-top: 2px; }

  /* ══════════════════════════════════════
     MOCKUP STYLES (shared)
     ══════════════════════════════════════ */
  .mock { background: var(--bg); border-radius: 12px; overflow: hidden; font-size: 12px; }
  .mock-nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
  }
  .mock-nav-brand { display: flex; align-items: center; gap: 8px; }
  .mock-nav-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
  }
  .mock-nav-name { color: var(--white); font-weight: 700; font-size: 15px; }
  .mock-nav-links { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }
  .mock-nav-lang {
    background: var(--surface); padding: 3px 8px;
    border-radius: 4px; font-size: 10px;
  }

  /* ── PRODUCT CARDS ──────────────────── */
  .product-card {
    background: var(--surface); border-radius: 8px; padding: 8px;
    position: relative; border: 1px solid var(--border);
  }
  .product-img {
    height: 50px; background: var(--surface-light);
    border-radius: 6px; margin-bottom: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text-muted);
  }
  .product-name { font-size: 9px; font-weight: 600; color: var(--text); }
  .product-price { font-size: 10px; font-weight: 700; color: var(--highlight); }
  .product-tag {
    position: absolute; top: 6px; left: 6px;
    font-size: 7px; font-weight: 700; padding: 2px 5px;
    border-radius: 3px; color: var(--white);
  }
  .tag-new { background: var(--primary); }
  .tag-sale { background: var(--danger); }
  .tag-sold { background: #64748b; }
  .tag-success { background: var(--success); }

  /* ── CATEGORY CIRCLES ───────────────── */
  .cat-circle {
    width: 50px; height: 50px; background: var(--surface);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 22px;
    border: 1px solid var(--border);
  }
  .cat-label { font-size: 9px; color: var(--text-muted); margin-top: 4px; text-align: center; }

  /* ── PAYMENT BUTTONS ────────────────── */
  .pay-btn {
    flex: 1; text-align: center; padding: 8px 4px; border-radius: 8px;
    font-size: 9px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; border: 2px solid var(--border);
    background: var(--surface); color: var(--text-muted);
  }
  .pay-btn.active { color: var(--white); }

  /* ── INPUT FIELDS ───────────────────── */
  .mock-input {
    background: var(--surface-light); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; font-size: 10px;
    color: var(--text-muted); width: 100%;
  }

  /* ── SUMMARY ROW ────────────────────── */
  .sum-row {
    display: flex; justify-content: space-between;
    color: var(--text-muted); margin-bottom: 4px; font-size: 9px;
  }
  .sum-total {
    display: flex; justify-content: space-between;
    font-weight: 700; color: var(--white); font-size: 12px;
    border-top: 1px solid var(--border); padding-top: 4px;
  }

  /* ── CTA BUTTON ─────────────────────── */
  .cta-btn {
    margin-top: 10px; background: var(--highlight); color: var(--bg-deep);
    text-align: center; padding: 10px 0; border-radius: 8px;
    font-weight: 700; font-size: 12px; cursor: pointer;
    border: none; width: 100%; transition: opacity 0.2s;
  }
  .cta-btn:hover { opacity: 0.9; }

  /* ── PHONE FRAME ────────────────────── */
  .phone {
    width: 180px; background: var(--bg-deep); border-radius: 24px;
    padding: 8px 0; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    margin: 0 auto;
  }
  .phone-notch {
    width: 60px; height: 6px; background: var(--surface);
    border-radius: 3px; margin: 0 auto 8px;
  }
  .phone-status {
    display: flex; justify-content: space-between;
    padding: 0 12px 6px; font-size: 7px; color: var(--text-muted);
  }
  .phone-screen { background: var(--bg); margin: 0 4px; border-radius: 12px; overflow: hidden; }
  .phone-home {
    width: 40px; height: 3px; background: var(--surface);
    border-radius: 2px; margin: 8px auto 0;
  }

  /* ── KPI CARDS ──────────────────────── */
  .kpi {
    background: var(--surface); border-radius: 8px; padding: 8px;
  }
  .kpi-label { font-size: 7px; color: var(--text-muted); }
  .kpi-value { font-size: 14px; font-weight: 800; color: var(--white); }
  .kpi-change { font-size: 8px; }

  /* ── BAR CHART ──────────────────────── */
  .bar {
    flex: 1; text-align: center;
  }
  .bar-fill {
    background: linear-gradient(180deg, var(--accent), var(--primary));
    border-radius: 4px 4px 0 0; min-height: 8px;
    transition: height 0.4s ease;
  }
  .bar-label { font-size: 6px; color: var(--text-muted); margin-top: 3px; }

  /* ── ARCH BOXES ─────────────────────── */
  .arch-box {
    border-radius: 8px; padding: 6px 10px;
    font-size: 9px; font-weight: 600; text-align: center;
    border-width: 2px; border-style: solid;
  }
  .arch-arrow { text-align: center; color: var(--text-muted); font-size: 16px; margin: 4px 0; }

  /* ── QUICK VIEW BTN ─────────────────── */
  .quick-view {
    margin-top: 4px; font-size: 7px; color: var(--white);
    background: var(--primary); text-align: center;
    padding: 3px 0; border-radius: 4px;
  }

  /* ── FILTER SIDEBAR ─────────────────── */
  .filter-item {
    padding: 5px 0; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
    font-size: 9px; color: var(--text-muted);
  }
  .filter-arrow { color: var(--accent); }

  /* Transitions */
  .mockup-panel { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Hidden helper */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════ -->
<div class="header">
  <div class="header-logo"></div>
  <div>
    <h1>ZapatoFlex — Plan de Escalabilidad</h1>
    <p>Mockups & Roadmap de Crecimiento (6 meses)</p>
  </div>
</div>

<!-- ══ TABS ════════════════════════════════ -->
<div class="tabs" id="tabs">
  <button class="tab active" data-idx="0">🏠 Home Rediseñado</button>
  <button class="tab" data-idx="1">📦 Catálogo Inteligente</button>
  <button class="tab" data-idx="2">💳 Checkout Multi-Pasarela</button>
  <button class="tab" data-idx="3">📱 App Móvil</button>
  <button class="tab" data-idx="4">📊 Panel Admin</button>
  <button class="tab" data-idx="5">🏗️ Arquitectura</button>
</div>

<!-- ══ MAIN CONTENT ═══════════════════════ -->
<div class="content">
  <div class="grid">
    <!-- LEFT: Preview -->
    <div>
      <div class="preview-label">Mockup Preview</div>
      <div class="preview-frame" id="preview-frame"></div>
    </div>
    <!-- RIGHT: Details -->
    <div id="details-panel"></div>
  </div>

  <!-- ROADMAP -->
  <div class="roadmap">
    <h2>📅 Roadmap de Implementación (6 meses)</h2>
    <div class="roadmap-grid" id="roadmap-grid"></div>
  </div>
</div>

<script>
// ══ DATA ═══════════════════════════════════
const mockups = [
  {
    title: "🏠 Home Rediseñado",
    subtitle: "Landing page optimizada para conversión",
    description: "Hero con búsqueda prominente, categorías visuales, ofertas dinámicas y selector de idioma/moneda para expansión internacional.",
    improvements: [
      "Hero con video/animación de producto estrella",
      "Barra de búsqueda predictiva con IA",
      "Categorías con iconografía premium",
      "Banner de ofertas dinámico por región",
      "Selector de idioma y moneda visible",
    ],
  },
  {
    title: "📦 Catálogo Inteligente",
    subtitle: "Filtros avanzados y vista rápida",
    description: "Catálogo con filtros laterales, ordenamiento múltiple, vista rápida de producto y paginación infinita optimizada con lazy loading.",
    improvements: [
      "Filtros por talla, color, precio, material",
      "Vista rápida sin cambiar de página",
      "Lazy loading + paginación infinita",
      "Etiquetas de 'Nuevo', 'Oferta', 'Agotado'",
      "Comparador de productos (hasta 3)",
    ],
  },
  {
    title: "💳 Checkout Multi-Pasarela",
    subtitle: "Patrón Strategy para pagos flexibles",
    description: "Checkout unificado con múltiples métodos de pago integrados mediante Strategy Pattern. Experiencia fluida en 3 pasos.",
    improvements: [
      "PayPal, Stripe, Mercado Pago integrados",
      "Agregar nuevos métodos sin tocar el core",
      "Cálculo dinámico de impuestos por región",
      "Resumen de pedido en tiempo real",
      "Dirección con autocompletado internacional",
    ],
  },
  {
    title: "📱 App Móvil",
    subtitle: "APIs REST/GraphQL compartidas",
    description: "App nativa consumiendo las mismas APIs del backend. Navegación por tabs, notificaciones push y experiencia offline-first.",
    improvements: [
      "Misma lógica de negocio que la web",
      "Navegación bottom tabs nativa",
      "Notificaciones push de pedidos",
      "Modo offline para catálogo",
      "Escaneo de código QR en tienda",
    ],
  },
  {
    title: "📊 Panel Admin",
    subtitle: "Métricas en tiempo real",
    description: "Dashboard administrativo con KPIs, gestión de inventario, pedidos y analítica por región para la expansión internacional.",
    improvements: [
      "KPIs en tiempo real (ventas, usuarios, conversión)",
      "Gestión de inventario multi-bodega",
      "Mapa de calor de ventas por país",
      "Alertas de stock bajo automáticas",
      "Reportes exportables por región",
    ],
  },
  {
    title: "🏗️ Arquitectura",
    subtitle: "Docker + Load Balancer + Cloud DB",
    description: "Diagrama de la arquitectura objetivo: contenedores Docker orquestados, balanceo de carga, base de datos gestionada y APIs compartidas.",
    improvements: [
      "Contenedores Docker con orquestación",
      "Load Balancer para distribución de tráfico",
      "Base de datos gestionada (RDS/Cloud SQL)",
      "CDN para assets estáticos",
      "CI/CD automatizado con GitHub Actions",
    ],
  },
];

const phases = [
  { m: "Mes 1-2", t: "Infraestructura", d: "Docker, CI/CD, Load Balancer, DB Cloud", color: "var(--primary)" },
  { m: "Mes 2-3", t: "Pagos & Catálogo", d: "Strategy Pattern, filtros avanzados, búsqueda", color: "var(--highlight)" },
  { m: "Mes 3-4", t: "APIs & Mobile", d: "REST/GraphQL, app React Native, auth", color: "#a78bfa" },
  { m: "Mes 4-5", t: "Internacional", d: "i18n, multi-moneda, impuestos por región", color: "var(--success)" },
  { m: "Mes 5-6", t: "Dashboard & QA", d: "Admin panel, analytics, testing, lanzamiento", color: "var(--danger)" },
];

let activeIdx = 0;
let activePayment = "stripe";

// ══ PREVIEW RENDERERS ═════════════════════
const renderers = {
  0: renderHome,
  1: renderCatalog,
  2: renderCheckout,
  3: renderMobile,
  4: renderDashboard,
  5: renderArchitecture,
};

function renderHome() {
  return `
    <div class="mock">
      <div class="mock-nav">
        <div class="mock-nav-brand">
          <div class="mock-nav-icon"></div>
          <span class="mock-nav-name">ZapatoFlex</span>
        </div>
        <div class="mock-nav-links">
          <span>Catálogo</span><span>Ofertas</span><span>Nosotros</span>
          <span class="mock-nav-lang">🌐 ES | COP</span>
        </div>
      </div>
      <div style="padding:40px 24px;text-align:center;background:linear-gradient(180deg,var(--bg),var(--bg-deep))">
        <div style="font-size:10px;color:var(--accent);letter-spacing:3px;margin-bottom:8px;text-transform:uppercase">Nueva Colección 2026</div>
        <div style="font-size:26px;font-weight:800;color:var(--white);line-height:1.2">Estilo que se adapta<br>a tu ritmo</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:10px">Envío gratis en Colombia 🇨🇴</div>
        <div style="margin:20px auto 0;max-width:320px;background:var(--surface);border-radius:25px;padding:10px 16px;display:flex;align-items:center;gap:8px;border:1px solid var(--border)">
          <span style="color:var(--text-muted);font-size:14px">🔍</span>
          <span style="color:var(--text-muted);font-size:12px">Buscar zapatos, tallas, estilos...</span>
        </div>
      </div>
      <div style="display:flex;justify-content:center;gap:12px;padding:16px 20px">
        ${["👟|Casual","👠|Formal","🥾|Botas","🩴|Sandalias"].map(c => {
          const [e,n] = c.split("|");
          return `<div style="text-align:center"><div class="cat-circle">${e}</div><div class="cat-label">${n}</div></div>`;
        }).join("")}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 16px 16px">
        ${[
          {n:"Urban Runner",p:"$189.900",tag:"NUEVO",cls:"tag-new"},
          {n:"Classic Leather",p:"$149.900",tag:"OFERTA",cls:"tag-sale"},

            ${p.tag ? `<div class="product-tag ${p.cls}">${p.tag}</div>` : ""}
            <div class="product-img"></div>
            <div class="product-name">${p.n}</div>
            <div class="product-price">${p.p}</div>
          </div>
        `).join("")}
      </div>
    </div>`;
}

function renderCatalog() {
  return `
    <div class="mock">
      <div style="padding:12px 16px;background:var(--bg-deep);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;font-size:14px;color:var(--white)">Catálogo</span>
        <div style="display:flex;gap:6px">
          <span style="font-size:10px;background:var(--surface);padding:3px 8px;border-radius:4px;color:var(--text-muted)">Ordenar ▾</span>

      </div>
      <div style="display:flex">
        <div style="width:100px;padding:10px;background:var(--bg-deep);border-right:1px solid var(--border)">
          <div style="font-weight:700;color:var(--accent);margin-bottom:6px;font-size:9px">Filtros</div>
          ${["Talla","Color","Precio","Material","Marca"].map(f =>
            `<div class="filter-item"><span>${f}</span><span class="filter-arrow">›</span></div>`
          ).join("")}
          <div style="margin-top:8px;background:var(--primary);color:var(--white);text-align:center;padding:4px 0;border-radius:4px;font-weight:600;font-size:8px">Aplicar</div>
        </div>
        <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px">
          ${[
            {n:"Flex Runner",p:"$189.900",r:"⭐ 4.8",s:"NUEVO",cls:"tag-success"},
            {n:"Classic Boot",p:"$249.900",r:"⭐ 4.5",s:"-20%",cls:"tag-sale"},
            {n:"Urban Step",p:"$159.900",r:"⭐ 4.9",s:null},
            {n:"Sport Air",p:"$199.900",r:"⭐ 4.7",s:"AGOTADO",cls:"tag-sold"},
          ].map(p => `
            <div class="product-card" style="${p.s==='AGOTADO'?'opacity:0.5':''}">
              ${p.s ? `<div class="product-tag ${p.cls}" style="left:auto;right:4px">${p.s}</div>` : ""}
              <div class="product-img">👟</div>
              <div class="product-name">${p.n}</div>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
                <span class="product-price">${p.p}</span>
                <span style="font-size:8px;color:var(--text-muted)">${p.r}</span>

function renderCheckout() {
  const methods = [
    {id:"stripe",label:"💳 Stripe",color:"#635bff"},
    {id:"paypal",label:"🅿️ PayPal",color:"#003087"},
    {id:"mercadopago",label:"🤝 M. Pago",color:"#00b1ea"},
    {id:"pse",label:"🏦 PSE",color:"#00a650"},
  ];
  return `
    <div class="mock">
      <div style="background:linear-gradient(135deg,var(--bg-deep),var(--surface));padding:14px 16px;display:flex;justify-content:space-between;align-items:center">
        <span style="color:var(--white);font-weight:700;font-size:14px">Checkout</span>
        <div style="display:flex;gap:16px;font-size:9px;color:var(--accent)">
          <span>① Envío</span><span style="opacity:0.5">② Pago</span><span style="opacity:0.3">③ Confirmar</span>
        </div>
      </div>
      <div style="padding:16px">
        <div style="font-size:10px;font-weight:700;color:var(--text);margin-bottom:8px">Método de pago</div>
        <div style="display:flex;gap:6px;margin-bottom:12px">
          ${methods.map(m => `

// ══ RENDER DETAILS ════════════════════════
function renderDetails(idx) {
  const m = mockups[idx];
  return `
    <div class="mockup-panel">
      <div class="detail-title">${m.title}</div>
      <div class="detail-subtitle">${m.subtitle}</div>
      <p class="detail-desc">${m.description}</p>
      <div class="detail-label">Mejoras clave:</div>
      ${m.improvements.map((imp, i) => `
        <div class="improvement">
          <div class="improvement-num">${i+1}</div>
          <span>${imp}</span>
        </div>
      `).join("")}
    </div>`;
}

// ══ RENDER ROADMAP ════════════════════════
function renderRoadmap(activeIdx) {
  return phases.map((p, i) => `
    <div class="phase">
      <div class="phase-bar" style="background:${p.color}30">
        <div class="phase-bar-fill" style="background:${p.color};width:${activeIdx >= i ? '100%' : '0%'}"></div>
      </div>
      <div class="phase-month" style="color:${p.color}">${p.m}</div>
      <div class="phase-title">${p.t}</div>
      <div class="phase-desc">${p.d}</div>
    </div>
  `).join("");
}

// ══ UPDATE VIEW ═══════════════════════════
function updateView() {
  document.getElementById("preview-frame").innerHTML = renderers[activeIdx]();
  document.getElementById("details-panel").innerHTML = renderDetails(activeIdx);
  document.getElementById("roadmap-grid").innerHTML = renderRoadmap(activeIdx);

  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", parseInt(t.dataset.idx) === activeIdx);
  });

  // Re-bind payment buttons if checkout is active
  if (activeIdx === 2) {
    document.querySelectorAll(".pay-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activePayment = btn.dataset.pay;
        updateView();
      });
    });
  }
}

// ══ EVENT LISTENERS ═══════════════════════
document.getElementById("tabs").addEventListener("click", (e) => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  activeIdx = parseInt(tab.dataset.idx);
  updateView();
});

// ══ INIT ══════════════════════════════════
updateView();
</script>

</html>
